<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/nike-tick.svg">
    <title>Checkout | AstroKicks</title>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">
    <a href="index.html">
      <img src="assets/nike-tick.svg" alt="AstroKicks logo" class="logo-icon">
      <span class="logo-text">AstroKicks</span>
    </a>
  </div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

  <div class="nav-cart">
    <a href="cart.html" class="cart-link">
      <img src="assets/cart-icon.svg" alt="Cart" class="cart-icon">
      <span class="cart-count">0</span>
    </a>
  </div>
</nav>

<section class="checkout-page">
  <h1 class="checkout-title">Checkout</h1>

  <div class="checkout-layout">

    <div class="checkout-form-container">
      <h2 class="checkout-subtitle">Shipping Details</h2>
      <form id="checkout-form">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="address">Street Address</label>
        <input type="text" id="address" required>

        <label for="city">City</label>
        <input type="text" id="city" required>

        <label for="postal-code">Postal Code</label>
        <input type="text" id="postal-code" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required>

        <button type="submit" class="hero-btn checkout-submit-btn">Place Order</button>
      </form>
    </div>

    <div class="checkout-summary-container" id="checkout-summary-container">
      <!-- Order summary injected by JS -->
    </div>

  </div>
</section>

<script src="js/checkout.js"></script>

</body>
</html>
